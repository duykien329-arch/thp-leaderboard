<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THP ESPORTS - LEADERBOARD</title>
    <!-- Thư viện giao diện Tailwind CSS và Font chữ Esport -->
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .font-esport { font-family: 'Orbitron', sans-serif; }
        .cyber-grid {
            background-size: 30px 30px;
            background-image: linear-gradient(to right, rgba(239, 68, 68, 0.04) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(239, 68, 68, 0.04) 1px, transparent 1px);
        }
    </style>
</head>
<body class="text-zinc-100 antialiased overflow-x-hidden min-h-screen flex flex-col justify-between">

    <!-- KHU VỰC CHẠY ỨNG DỤNG -->
    <div id="app" class="flex-1 flex flex-col justify-between"></div>

    <script>
        // Cấu hình điểm hạng chuẩn quốc tế (Top 1 = 12đ, Top 2 = 9đ, ...)
        const REWARD_POINTS = { 1: 12, 2: 9, 3: 8, 4: 7, 5: 6, 6: 5, 7: 4, 8: 3, 9: 2, 10: 1, 11: 0, 12: 0 };

        // QUẢN LÝ TRẠNG THÁI (STATE) ỨNG DỤNG
        let currentView = 'home'; 
        let searchQuery = '';
        let selectedAdminTeam = 't1';
        let inputRank = '1';
        let inputKills = '0';

        // Dữ liệu danh sách đội tuyển mặc định ban đầu
        let databaseTeams = [
            { id: 't1', name: 'HEAVY TEAM', flag: '🇻🇳', kills: 24, rank: 1 },
            { id: 't2', name: 'TEAM FLASH', flag: '🇻🇳', kills: 16, rank: 2 },
            { id: 't3', name: 'BOX GAMING', flag: '🇻🇳', kills: 12, rank: 4 },
            { id: 't4', name: 'V GAMING', flag: '🇻🇳', kills: 8, rank: 6 }
        ];

        // HÀM XỬ LÝ: Tính toán điểm số và sắp xếp thứ hạng
        const processLeaderboardData = () => {
            return databaseTeams
                .map(team => {
                    const placementPts = REWARD_POINTS[team.rank] || 0;
                    const totalPts = placementPts + (team.kills || 0);
                    return { ...team, placement_points: placementPts, total_points: totalPts };
                })
                .filter(team => team.name.toLowerCase().includes(searchQuery.toLowerCase()))
                .sort((a, b) => b.total_points - a.total_points || b.kills - a.kills);
        };

        // HÀM XỬ LÝ: Admin cập nhật điểm cho đội tuyển
        window.submitAdminForm = (event) => {
            event.preventDefault();
            const targetIndex = databaseTeams.findIndex(t => t.id === selectedAdminTeam);
            if (targetIndex !== -1) {
                databaseTeams[targetIndex].rank = parseInt(inputRank);
                databaseTeams[targetIndex].kills = parseInt(inputKills);
                alert(`Cập nhật điểm thành công cho đội ${databaseTeams[targetIndex].name}!`);
                renderApp();
            }
        };

        // HÀM XỬ LÝ: Đặt lại toàn bộ giải đấu về trạng thái ban đầu
        window.triggerResetMatch = () => {
            if (confirm("Hành động này sẽ reset điểm số của tất cả các đội về 0. Bạn có chắc chắn không?")) {
                databaseTeams.forEach(team => {
                    team.rank = 12;
                    team.kills = 0;
                });
                renderApp();
            }
        };

        // HÀM ĐIỀU HƯỚNG VIEW
        window.navigateToView = (targetView) => {
            currentView = targetView;
            renderApp();
        };

        // HÀM LẮNG NGHE Ô TÌM KIẾM
        window.updateSearchValue = (inputElement) => {
            searchQuery = inputElement.value;
            renderApp();
        };

        // HÀM CHÍNH: Vẽ giao diện ứng dụng lên màn hình
        const renderApp = () => {
            const sortedRecords = processLeaderboardData();

            // Khung sườn giao diện chính có Header
            let viewHtml = `
                <div class="w-full flex flex-col flex-1">
                    <!-- THANH ĐIỀU HƯỚNG HEADER -->
                    <header class="w-full bg-zinc-950/80 backdrop-blur-md border-b border-zinc-900 sticky top-0 z-50 px-4 py-3.5">
                        <div class="max-w-5xl w-full mx-auto flex items-center justify-between">
                            <div class="font-esport font-black text-lg tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-amber-500">
                                THP CHAMPIONSHIP
                            </div>
                            <nav class="flex items-center gap-4 text-xs font-bold font-esport uppercase">
                                <button onClick="navigateToView('home')" class="pb-1 transition-colors ${currentView === 'home' ? 'text-red-500 border-b-2 border-red-500' : 'text-zinc-400 hover:text-zinc-100'}">Trang Chủ</button>
                                <button onClick="navigateToView('leaderboard')" class="pb-1 transition-colors ${currentView === 'leaderboard' ? 'text-red-500 border-b-2 border-red-500' : 'text-zinc-400 hover:text-zinc-100'}">Bảng Xếp Hạng</button>
                                <button onClick="navigateToView('admin')" class="pb-1 transition-colors ${currentView === 'admin' ? 'text-red-500 border-b-2 border-red-500' : 'text-zinc-400 hover:text-zinc-100'}">Quản Trị</button>
                            </nav>
                        </div>
                    </header>
            `;

            // MÀN HÌNH 1: TRANG CHỦ (HOME)
            if (currentView === 'home') {
                viewHtml += `
                    <main class="flex-1 flex flex-col items-center justify-center px-4 relative py-16">
                        <div class="absolute inset-0 cyber-grid pointer-events-none"></div>
                        <div class="text-center z-10 max-w-sm w-full">
                            <span class="px-2.5 py-1 rounded bg-red-600/10 text-red-500 border border-red-500/20 font-bold text-[9px] tracking-widest font-esport uppercase">
                                Live Hub Tournament
                            </span>
                            <h1 class="text-3xl font-black font-esport tracking-tight mt-3 text-white uppercase">
                                THP CHAMPIONSHIP
                            </h1>
                            <p class="mt-3 text-zinc-400 text-xs leading-relaxed">
                                Hệ thống cập nhật kết quả và điểm số trận đấu theo thời gian thực dành cho giải đấu Free Fire chuyên nghiệp.
                            </p>
                            <div class="mt-8">
                                <button onClick="navigateToView('leaderboard')" class="w-full sm:w-auto px-6 py-3 bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-700 hover:to-orange-700 text-white font-bold rounded-lg shadow-lg shadow-red-600/20 transition-all uppercase tracking-wider text-xs font-esport">
                                    🔥 Xem Bảng Xếp Hạng Live
                                </button>
                            </div>
                        </div>
                    </main>
                `;
            }

            // MÀN HÌNH 2: BẢNG XẾP HẠNG (LEADERBOARD)
            if (currentView === 'leaderboard') {
                viewHtml += `
                    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-6 z-20">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-5">
                            <div>
                                <h2 class="text-lg font-black font-esport text-white tracking-wider uppercase">BẢNG XẾP HẠNG GIẢI ĐẤU</h2>
                                <p class="text-[10px] text-emerald-400 font-bold animate-pulse uppercase tracking-widest mt-0.5">• LIVE UPDATE</p>
                            </div>
                            <div class="w-full sm:w-60">
                                <input type="text" value="${searchQuery}" onInput="updateSearchValue(this)" placeholder="🔍 Tìm kiếm đội tuyển..." class="w-full px-3.5 py-2 bg-zinc-900 text-white placeholder-zinc-500 rounded-lg border border-zinc-800 focus:outline-none focus:border-red-500 text-xs transition-all" />
                            </div>
                        </div>

                        <div class="bg-zinc-900/40 border border-zinc-900 rounded-xl overflow-x-auto">
                            <table class="w-full text-left border-collapse text-xs min-w-[500px]">
                                <thead class="bg-zinc-950 text-zinc-400 font-esport uppercase text-[9px] tracking-wider border-b border-zinc-900">
                                    <tr>
                                        <th class="py-3 px-4 text-center w-14">Hạng</th>
                                        <th class="py-3 px-4">Đội tuyển</th>
                                        <th class="py-3 px-4 text-center w-20">Thứ Hạng</th>
                                        <th class="py-3 px-4 text-center w-20">Điểm Hạng</th>
                                        <th class="py-3 px-4 text-center w-20">Điểm Kills</th>
                                        <th class="py-3 px-4 text-right w-24 pr-5">Tổng Điểm</th>
                                    </tr>
                                </thead>
                                <tbody class="text-zinc-300 divide-y divide-zinc-900/40">
                                    ${sortedRecords.map((team, index) => `
                                        <tr class="hover:bg-zinc-900/20 transition-colors">
