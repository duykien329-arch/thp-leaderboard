<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THP ESPORTS - PRO LEADERBOARD</title>
    <style>
        :root { --bg: #09090b; --panel: #141416; --border: #27272a; --primary: #f97316; --neon: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #f4f4f5; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 15px; }
        header { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 16px; letter-spacing: 1px; background: linear-gradient(to right, var(--neon), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status { font-size: 9px; font-weight: bold; background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.3); color: #34d399; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
        .card-title { font-size: 11px; font-weight: 800; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; border-left: 3px solid var(--primary); padding-left: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { font-size: 9px; color: #71717a; text-transform: uppercase; font-weight: 700; padding: 10px 8px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 8px; text-align: center; border-bottom: 1px solid rgba(39,39,42,0.5); }
        .rank { font-weight: 900; color: #fbbf24; }
        .team-info { display: flex; align-items: center; gap: 8px; font-weight: 600; text-align: left; color: #fff; }
        .pts-kill { color: #f87171; font-weight: 600; }
        .pts-total { font-weight: 900; color: #34d399; font-size: 14px; text-align: right; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; font-weight: 700; color: #a1a1aa; text-transform: uppercase; }
        select, input { background: #09090b; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: #fff; font-size: 13px; width: 100%; outline: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; padding: 12px; background: linear-gradient(to right, #ea580c, #dc2626); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 8px; font-size: 10px; margin-top: 10px; width: 100%; }
        footer { text-align: center; font-size: 9px; color: #3f3f46; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">THP CHAMPIONSHIP</div>
            <span id="connection-status" class="status">• ĐÁM MÂY ONLINE</span>
        </header>

        <div class="card">
            <div class="card-title">BẢNG XẾP HẠNG THỜI GIAN THỰC</div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50px;">Hạng</th>
                            <th style="text-align: left;">Đội tuyển</th>
                            <th style="width: 50px;">Trận</th>
                            <th style="width: 60px;">Kills</th>
                            <th style="text-align: right; width: 70px;">Tổng</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-title" style="border-color: #ef4444;">BẢNG NHẬP ĐIỂM ADMIN</div>
            <form id="admin-form" class="admin-form">
                <div class="form-group">
                    <label>Chọn Đội Tuyển</label>
                    <select id="select-team"></select>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Hạng Trận</label>
                        <input id="input-rank" type="number" min="1" max="12" value="1" required />
                    </div>
                    <div class="form-group">
                        <label>Số Kills</label>
                        <input id="input-kills" type="number" min="0" value="0" required />
                    </div>
                </div>
                <button type="submit" class="btn">CẬP NHẬT ĐÁM MÂY</button>
            </form>
            <button id="reset-btn" class="btn-outline">⚠️ RESET TOÀN BỘ GIẢI ĐẤU</button>
        </div>

        <footer>&copy; THP CHAMPIONSHIP | ULTIMATE SPEED MODE</footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://firebaseio.com" };
        
        let db = null;
        let teamsRef = null;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            teamsRef = ref(db, 'thp_championship/teams');
        } catch(e) { console.log("Firebase setup error, switching to safe mode"); }

        const PLACEMENT_POINTS = { 1: 12, 2: 9, 3: 8, 4: 7, 5: 6, 6: 5, 7: 4, 8: 3, 9: 2, 10: 1, 11: 0, 12: 0 };

        let initialTeams = [
            { id: 'team_01', name: 'HEAVY TEAM', flag_emoji: '🇻🇳', kill_points: 24, rank_match: 1 },
            { id: 'team_02', name: 'TEAM FLASH', flag_emoji: '🇻🇳', kill_points: 16, rank_match: 2 },
            { id: 'team_03', name: 'BOX GAMING', flag_emoji: '🇻🇳', kill_points: 12, rank_match: 3 },
            { id: 'team_04', name: 'V GAMING', flag_emoji: '🇻🇳', kill_points: 8, rank_match: 4 }
        ];

        function renderUI() {
            const sortedData = initialTeams
                .map(t => {
                    const pts = PLACEMENT_POINTS[t.rank_match] || 0;
                    return { ...t, total_points: pts + (parseInt(t.kill_points) || 0) };
                })
                .sort((a, b) => b.total_points - a.total_points);

            document.getElementById('leaderboard-body').innerHTML = sortedData.map((t, idx) => `
                <tr>
                    <td class="rank">#${idx + 1}</td>
                    <td><div class="team-info"><span>${t.flag_emoji}</span><span>${t.name}</span></div></td>
                    <td style="color: #a1a1aa;">1</td>
                    <td class="pts-kill">${t.kill_points}</td>
                    <td class="pts-total">${t.total_points}</td>
                </tr>
            `).join('');

            const select = document.getElementById('select-team');
            const savedVal = select.value;
            select.innerHTML = initialTeams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            if(savedVal) select.value = savedVal;
        }

        if(teamsRef) {
            onValue(teamsRef, (snap) => {
                const data = snap.val();
                if (data) {
                    initialTeams = Object.keys(data).map(k => data[k]);
                    renderUI();
                }
            });
        }

        document.getElementById('admin-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('select-team').value;
            const rank = parseInt(document.getElementById('input-rank').value);
            const kills = parseInt(document.getElementById('input-kills').value);
            
            const team = initialTeams.find(t => t.id === id);
            if(team) {
                team.rank_match = rank;
                team.kill_points = kills;
                if(db) set(ref(db, `thp_championship/teams/${id}`), team);
                renderUI();
                alert("Cập nhật thành công!");
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if(confirm("Xác nhận xóa trắng điểm số?")) {
                initialTeams.forEach(t => {
                    t.rank_match = 12;
                    t.kill_points = 0;
                    if(db) set(ref(db, `thp_championship/teams/${t.id}`), t);
                });
                renderUI();
            }
        });

        renderUI();
    </script>
</body>
</html>
