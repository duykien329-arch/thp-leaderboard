<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THP ESPORTS - REALTIME LEADERBOARD</title>
    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .font-esport { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="text-zinc-100 antialiased min-h-screen flex flex-col justify-between p-4">

    <!-- HEADER -->
    <header class="w-full max-w-4xl mx-auto bg-zinc-950/90 border-b border-zinc-900 py-4 px-2 flex justify-between items-center">
        <div class="font-esport font-black text-lg tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">
            THP CHAMPIONSHIP
        </div>
        <span id="connection-status" class="text-[10px] text-amber-500 border border-amber-500/20 bg-amber-500/5 px-2 py-0.5 rounded font-esport font-bold animate-pulse">
            • ĐANG KẾT NỐI MẠNG...
        </span>
    </header>

    <!-- MAIN INTERFACE -->
    <main class="flex-1 w-full max-w-4xl mx-auto py-6 space-y-6">
        
        <!-- BẢNG XẾP HẠNG -->
        <div class="bg-zinc-900/40 border border-zinc-900 rounded-xl p-4">
            <h2 class="text-xs font-bold text-zinc-400 font-esport uppercase tracking-wider mb-3">BẢNG XẾP HẠNG THỜI GIAN THỰC</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-xs min-w-[400px]">
                    <thead class="bg-zinc-950 text-zinc-500 font-esport uppercase text-[9px] tracking-wider border-b border-zinc-900">
                        <tr>
                            <th class="py-2.5 px-3 text-center w-12">Hạng</th>
                            <th class="py-2.5 px-3">Đội tuyển</th>
                            <th class="py-2.5 px-3 text-center w-16">Hạng Trận</th>
                            <th class="py-2.5 px-3 text-center w-16">Điểm Hạng</th>
                            <th class="py-2.5 px-3 text-center w-16">Điểm Kills</th>
                            <th class="py-2.5 px-3 text-right w-20 pr-4">Tổng Điểm</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="text-zinc-300 divide-y divide-zinc-900/40">
                        <!-- Dữ liệu từ Firebase tự động vẽ vào đây -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- FORM ADMIN NHẬP ĐIỂM -->
        <div class="bg-zinc-900/30 border border-zinc-900/60 p-4 rounded-xl max-w-sm mx-auto">
            <h3 class="text-xs font-bold font-esport text-zinc-400 uppercase tracking-wider mb-4 text-center">BẢNG NHẬP ĐIỂM ADMIN</h3>
            <form id="admin-form" class="space-y-3 text-xs">
                <div>
                    <label class="block text-zinc-500 mb-1">Chọn Đội Tuyển</label>
                    <select id="select-team" class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-lg text-white focus:outline-none">
                        <!-- Danh sách đội từ Firebase tự động nạp vào đây -->
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-zinc-500 mb-1">Hạng Trận</label>
                        <input id="input-rank" type="number" min="1" max="12" value="1" class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-lg text-white focus:outline-none" required />
                    </div>
                    <div>
                        <label class="block text-zinc-500 mb-1">Số Kills</label>
                        <input id="input-kills" type="number" min="0" value="0" class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-lg text-white focus:outline-none" required />
                    </div>
                </div>
                <button type="submit" class="w-full py-2 bg-gradient-to-r from-red-600 to-orange-600 font-bold rounded-lg tracking-wider text-[11px] font-esport uppercase mt-2">
                    CẬP NHẬT ĐÁM MÂY
                </button>
            </form>

            <div class="border-t border-zinc-900/80 mt-5 pt-4">
                <button onClick="resetAllTeamsData()" class="w-full py-2 bg-zinc-950 hover:bg-red-950/10 text-red-500 hover:text-red-400 border border-red-950/40 hover:border-red-800 font-bold rounded-lg text-[9px] font-esport tracking-widest uppercase transition-all">
                    ⚠️ RESET TOÀN BỘ GIẢI ĐẤU
                </button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="w-full text-center py-4 text-zinc-700 text-[9px] font-esport uppercase">
        &copy; THP CHAMPIONSHIP | CLOUD REALTIME MODE
    </footer>

    <!-- NHÚNG MODULE FIREBASE CHUẨN GOOGLE (DÒNG 105+) -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, onValue, set } from "https://gstatic.com";

        // ⚠️ ĐÂY LÀ CHÌA KHÓA KẾT NỐI: Bạn cần thay bằng cấu hình Firebase của bạn
        const firebaseConfig = {
            databaseURL: "https://firebaseio.com"
        };

        // Khởi tạo Firebase kết nối đám mây
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const teamsRef = ref(db, 'tournaments/thp_championship/teams');

        // Bảng quy đổi điểm thứ hạng Free Fire
        const PLACEMENT_POINTS = { 1: 12, 2: 9, 3: 8, 4: 7, 5: 6, 6: 5, 7: 4, 8: 3, 9: 2, 10: 1, 11: 0, 12: 0 };

        // Mảng danh sách đội mặc định (Dùng để khởi tạo database nếu rỗng)
        const initialTeams = [
            { id: 'team_01', name: 'HEAVY TEAM', flag_emoji: '🇻🇳', kill_points: 0, rank_match: 12 },
            { id: 'team_02', name: 'TEAM FLASH', flag_emoji: '🇻🇳', kill_points: 0, rank_match: 12 },
            { id: 'team_03', name: 'BOX GAMING', flag_emoji: '🇻🇳', kill_points: 0, rank_match: 12 },
            { id: 'team_04', name: 'V GAMING', flag_emoji: '🇻🇳', kill_points: 0, rank_match: 12 }
        ];

        let currentLocalTeams = [];

        // HÀM LẮNG NGHE ĐỒNG BỘ DỮ LIỆU REALTIME TỪ TRÊN MẠNG XUỐNG
        onValue(teamsRef, (snapshot) => {
            const data = snapshot.val();
            
            // Nếu database trên mạng trống trơn, tự động đẩy danh sách đội mặc định lên
            if (!data) {
                initialTeams.forEach(t => {
                    set(ref(db, `tournaments/thp_championship/teams/${t.id}`), t);
                });
                return;
            }

            // Chuyển đổi dữ liệu Object từ mạng sang dạng Mảng để tính toán
            currentLocalTeams = Object.keys(data).map(key => ({ id: key, ...data[key] }));

            // Cập nhật trạng thái đèn báo Live màu xanh lá cây
            const statusBadge = document.getElementById('connection-status');
            statusBadge.className = "text-[10px] text-emerald-400 border border-emerald-500/20 bg-emerald-500/5 px-2 py-0.5 rounded font-esport font-bold animate-pulse";
            statusBadge.innerText = "• ĐÃ ĐỒNG BỘ ĐÁM MÂY";

            // Vẽ bảng điểm và sắp xếp thứ hạng tự động
            updateLeaderboardUI();
            updateAdminSelectUI();
        });

        // HÀM XỬ LÝ: Tính điểm và render giao diện
        function updateLeaderboardUI() {
            const sortedData = currentLocalTeams
                .map(t => {
                    const placementPts = PLACEMENT_POINTS[t.rank_match] || 0;
                    const totalPts = placementPts + (parseInt(t.kill_points) || 0);
                    return { ...t, placement_points: placementPts, total_points: totalPts };
                })
                .sort((a, b) => b.total_points - a.total_points || b.kill_points - a.kill_points);

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = sortedData.map((t, idx) => `
                <tr class="hover:bg-zinc-900/20 transition-colors">
                    <td class="py-3 px-3 text-center font-black ${idx === 0 ? 'text-amber-400 text-sm' : idx === 1 ? 'text-zinc-400' : 'text-amber-700'}">#${idx + 1}</td>
                    <td class="py-3 px-3 font-semibold text-white">${t.flag_emoji} ${t.name}</td>
                    <td class="py-3 px-3 text-center text-zinc-500">Top ${t.rank_match}</td>
                    <td class="py-3 px-3 text-center">${t.placement_points}</td>
                    <td class="py-3 px-3 text-center text-red-400 font-medium">${t.kill_points}</td>
                    <td class="py-3 px-3 text-right font-black text-emerald-400 text-sm pr-4">${t.total_points}</td>
                </tr>
            `).join('');
        }

        // HÀM XỬ LÝ: Đồng bộ danh sách đội vào ô chọn của Admin
        function updateAdminSelectUI() {
            const select = document.getElementById('select-team');
            const currentSelected = select.value;
            select.innerHTML = currentLocalTeams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            if (currentSelected) select.value = currentSelected;
        }

        // SỰ KIỆN: Admin nhấn nút cập nhật điểm lên mây Firebase
        document.getElementById('admin-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const teamId = document.getElementById('select-team').value;
            const rank = parseInt(document.getElementById('input-rank').value);
            const kills = parseInt(document.getElementById('input-kills').value);
