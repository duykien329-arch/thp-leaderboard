<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THP ESPORTS - BẢNG XẾP HẠNG</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .font-esport { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="text-zinc-100 antialiased min-h-screen flex flex-col justify-between p-4">

    <!-- HEADER -->
    <header class="w-full max-w-4xl mx-auto bg-zinc-950/90 border-b border-zinc-900 py-4 px-2 flex justify-between items-center">
        <div class="font-esport font-black text-lg tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">
            THP CHAMPIONSHIP
        </div>
        <span class="text-[10px] text-emerald-400 border border-emerald-500/20 bg-emerald-500/5 px-2 py-0.5 rounded font-esport font-bold animate-pulse">
            • LIVE
        </span>
    </header>

    <!-- GIAO DIỆN BẢNG XẾP HẠNG CHÍNH -->
    <main class="flex-1 w-full max-w-4xl mx-auto py-6 space-y-6">
        
        <div class="bg-zinc-900/40 border border-zinc-900 rounded-xl p-4">
            <h2 class="text-xs font-bold text-zinc-400 font-esport uppercase tracking-wider mb-3">BẢNG XẾP HẠNG HIỆN TẠI</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-xs min-w-[400px]">
                    <thead class="bg-zinc-950 text-zinc-500 font-esport uppercase text-[9px] tracking-wider border-b border-zinc-900">
                        <tr>
                            <th class="py-2.5 px-3 text-center w-12">Hạng</th>
                            <th class="py-2.5 px-3">Đội tuyển</th>
                            <th class="py-2.5 px-3 text-center w-16">Trận</th>
                            <th class="py-2.5 px-3 text-center w-16">Kills</th>
                            <th class="py-2.5 px-3 text-right w-20 pr-4">Tổng Điểm</th>
                        </tr>
                    </thead>
                    <tbody class="text-zinc-300 divide-y divide-zinc-900/40">
                        <tr class="bg-zinc-900/10">
                            <td class="py-3 px-3 text-center font-black text-amber-400 text-sm">#1</td>
                            <td class="py-3 px-3 font-semibold text-white">🇻🇳 HEAVY TEAM</td>
                            <td class="py-3 px-3 text-center">1</td>
                            <td class="py-3 px-3 text-center text-red-400">24</td>
                            <td class="py-3 px-3 text-right font-black text-emerald-400 text-sm pr-4">36</td>
                        </tr>
                        <tr>
                            <td class="py-3 px-3 text-center font-black text-zinc-400">#2</td>
                            <td class="py-3 px-3 font-semibold text-white">🇻🇳 TEAM FLASH</td>
                            <td class="py-3 px-3 text-center">1</td>
                            <td class="py-3 px-3 text-center text-red-400">16</td>
                            <td class="py-3 px-3 text-right font-black text-emerald-400 text-sm pr-4">25</td>
                        </tr>
                        <tr>
                            <td class="py-3 px-3 text-center font-black text-amber-700">#3</td>
                            <td class="py-3 px-3 font-semibold text-white">🇻🇳 BOX GAMING</td>
                            <td class="py-3 px-3 text-center">1</td>
                            <td class="py-3 px-3 text-center text-red-400">12</td>
                            <td class="py-3 px-3 text-right font-black text-emerald-400 text-sm pr-4">19</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- BẢNG ĐIỀU KHIỂN CỦA QUẢN TRỊ VIÊN -->
        <div class="bg-zinc-900/30 border border-zinc-900/60 p-4 rounded-xl max-w-sm mx-auto">
            <h3 class="text-xs font-bold font-esport text-zinc-400 uppercase tracking-wider mb-4 text-center">CẬP NHẬT ĐIỂM SỐ NHANH</h3>
            <div class="space-y-3 text-xs">
                <div>
                    <label class="block text-zinc-500 mb-1">Chọn Đội Tuyển</label>
                    <select class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-lg text-white focus:outline-none">
                        <option>HEAVY TEAM</option>
                        <option>TEAM FLASH</option>
                        <option>BOX GAMING</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-zinc-500 mb-1">Hạng Trận</label>
                        <input type="number" value="1" class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-lg text-white focus:outline-none" />
                    </div>
                    <div>
                        <label class="block text-zinc-500 mb-1">Số Kills</label>
                        <input type="number" value="0" class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-lg text-white focus:outline-none" />
                    </div>
                </div>
                <button onClick="alert('Hệ thống đang chạy chế độ Offline tĩnh. Hãy tích hợp Firebase để lưu trữ!')" class="w-full py-2 bg-gradient-to-r from-red-600 to-orange-600 font-bold rounded-lg tracking-wider text-[11px] font-esport uppercase mt-2">
                    LƯU DỮ LIỆU
                </button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="w-full text-center py-4 text-zinc-700 text-[9px] font-esport uppercase">
        &copy; THP CHAMPIONSHIP | STATIC SAFE MODE
    </footer>

</body>
</html>
